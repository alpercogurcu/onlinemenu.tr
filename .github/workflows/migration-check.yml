name: Migration Check

on:
  pull_request:
    paths:
      - 'backend/migrations/**'
      - 'deploy/postgres/**'
      - '.github/workflows/migration-check.yml'

env:
  # Migrations run as app_migrator (table owner) to mirror production
  # (ADR-SEC-002). Roles are bootstrapped in the "Bootstrap roles" step.
  MIGRATOR_URL: postgres://app_migrator:migrator_ci_password@localhost:5432/onlinemenu_test?sslmode=disable

jobs:
  migration-dry-run:
    name: Migration Dry Run
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: onlinemenu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install golang-migrate CLI
        run: |
          MIGRATE_VERSION="v4.18.1"
          curl -sSL \
            "https://github.com/golang-migrate/migrate/releases/download/${MIGRATE_VERSION}/migrate.linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin migrate
          migrate -version

      - name: Bootstrap roles (ADR-SEC-002 parity)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d onlinemenu_test <<'SQL'
          CREATE ROLE app_migrator WITH LOGIN PASSWORD 'migrator_ci_password' CREATEDB BYPASSRLS;
          CREATE ROLE app_runtime  WITH LOGIN PASSWORD 'runtime_ci_password';
          GRANT CONNECT ON DATABASE onlinemenu_test TO app_migrator;
          GRANT CONNECT ON DATABASE onlinemenu_test TO app_runtime;
          GRANT USAGE, CREATE ON SCHEMA public TO app_migrator;
          GRANT USAGE ON SCHEMA public TO app_runtime;
          ALTER DEFAULT PRIVILEGES FOR ROLE app_migrator IN SCHEMA public
              GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_runtime;
          ALTER DEFAULT PRIVILEGES FOR ROLE app_migrator IN SCHEMA public
              GRANT USAGE ON SEQUENCES TO app_runtime;
          SQL

      - name: Migration dry-run — all modules (up, then down+up where possible)
        run: |
          set -euo pipefail
          # Dependency order per docs/db-schema.md "Modül — Migration Eşlemesi".
          MODULES="tenant identity hr-core catalog party inventory pos payment billing"
          for mod in $MODULES; do
            path="backend/migrations/$mod"
            [ -d "$path" ] || { echo "::error::missing migration dir $path"; exit 1; }
            # Each module gets its own version table; sharing the default
            # schema_migrations table makes version numbers collide across
            # modules and silently skips migrations.
            table="schema_migrations_$(echo "$mod" | tr '-' '_')"
            url="$MIGRATOR_URL&x-migrations-table=$table"
            echo "=== $mod: up ==="
            migrate -path "$path" -database "$url" up

            # down+up round-trip only for the head migration, and only when it
            # actually ships a .down.sql (early migrations predate the
            # down-file convention).
            head_version=$(ls "$path"/*.up.sql | sed -E 's/.*\/([0-9]+)_.*/\1/' | sort -n | tail -1)
            if ls "$path/${head_version}"_*.down.sql >/dev/null 2>&1; then
              echo "=== $mod: down 1 + re-up (head $head_version) ==="
              migrate -path "$path" -database "$url" down 1
              migrate -path "$path" -database "$url" up
            else
              echo "=== $mod: head $head_version has no down file, skipping round-trip ==="
            fi
          done
