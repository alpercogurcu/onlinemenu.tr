run:
  timeout: 5m
  go: '1.24'

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - goimports
    - revive
    - exhaustive
    - wrapcheck
    - contextcheck
  disable:
    - depguard

linters-settings:
  goimports:
    local-prefixes: onlinemenu.tr

  revive:
    rules:
      - name: exported
      - name: error-return
      - name: var-naming
      - name: indent-error-flow

  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - .Wrap(
      - .Wrapf(
    ignorePackageGlobs:
      - onlinemenu.tr/internal/platform/*

  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    # Test files may use testify assertions without wrapping errors.
    - path: _test\.go
      linters:
        - wrapcheck
        - errcheck

    # cmd/migrate uses os.Exit in main by design.
    - path: cmd/
      linters:
        - wrapcheck

  # Maximum issues per linter before the run fails.
  max-issues-per-linter: 50
  max-same-issues: 10
