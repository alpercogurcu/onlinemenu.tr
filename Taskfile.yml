version: '3'

dotenv: ['backend/.env']

includes:
  backend:
    taskfile: ./backend/Taskfile.yml
    dir: ./backend
  web:
    taskfile: ./web/Taskfile.yml
    optional: true
  mobile:
    taskfile: ./mobile/Taskfile.yml
    optional: true

tasks:
  dev:
    desc: "Tüm stack'i başlat (compose + backend hot-reload)"
    deps: [compose:up]
    cmds:
      - task: backend:dev

  compose:up:
    desc: "docker-compose.dev.yml'deki tüm servisleri başlat (core+auth+storage+observability)"
    cmds:
      - docker compose -f deploy/docker-compose.dev.yml --profile core --profile auth --profile storage --profile observability up -d

  compose:up:core:
    desc: "Yalnızca core servisleri başlat (postgres, redis, nats, vault)"
    cmds:
      - docker compose -f deploy/docker-compose.dev.yml --profile core up -d

  compose:down:
    desc: "Dev servislerini durdur"
    cmds:
      - docker compose -f deploy/docker-compose.dev.yml down

  compose:logs:
    desc: "Dev servis loglarını izle"
    cmds:
      - docker compose -f deploy/docker-compose.dev.yml logs -f

  web:dev:
    desc: "Admin paneli dev server (Next.js)"
    dir: web/apps/admin
    cmds:
      - pnpm dev

  web:build:
    desc: "Admin paneli production build"
    dir: web
    cmds:
      - pnpm build

  web:install:
    desc: "Frontend bağımlılıklarını kur (tüm workspace)"
    dir: web
    cmds:
      - pnpm install

  pos:dev:
    desc: "POS desktop dev (Wails)"
    dir: web/apps/pos-desktop
    cmds:
      # CGO_LDFLAGS workaround: Wails' internal `-tags dev` build (used by
      # `wails dev` for its devserver/live-reload asset path) references
      # UTType without linking UniformTypeIdentifiers on newer macOS SDKs
      # (reproduced on Xcode 16 / macOS 14.6.1 with Wails v2.11.0, including
      # on an unmodified `wails init` template — not specific to this app).
      # Harmless no-op on non-darwin hosts.
      - |
        if [ "$(go env GOOS)" = "darwin" ]; then
          export CGO_LDFLAGS="-framework UniformTypeIdentifiers"
        fi
        wails dev

  pos:build:
    desc: "POS desktop production build"
    dir: web/apps/pos-desktop
    cmds:
      - wails build

  pos:test:
    desc: "POS desktop Go testleri (race + cover)"
    dir: web/apps/pos-desktop
    cmds:
      - go build ./...
      - go vet ./...
      - go test -race -cover ./...

  pos:generate:
    desc: "POS desktop Wails binding'lerini üret (frontend/wailsjs, commit edilmez)"
    dir: web/apps/pos-desktop
    cmds:
      - wails generate module

  ci:
    desc: "CI pipeline lokalde simüle et"
    cmds:
      - task: backend:ci

  clean:
    desc: "Tüm build artifact'larını sil"
    cmds:
      - task: backend:clean
