run:
  timeout: 5m
  go: '1.24'

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - goimports
    - revive
    - exhaustive
    - wrapcheck
    - contextcheck
    - forbidigo
  disable:
    - depguard

linters-settings:
  goimports:
    local-prefixes: onlinemenu.tr

  # forbidigo enforces ADR-SEC-001/002 in CI: module code must never reach the raw
  # pgxpool.Pool (the RLS-bypass path) and must always go through WithTenantTx /
  # WithTenantReadTx / WithAllTenantsTx. analyze-types is required so that the
  # patterns match by resolved receiver type (db.Pool, pgxpool.Pool), not by the
  # literal source text — otherwise renaming a local variable would silently
  # defeat the rule. See docs/lessons-from-b2b.md item 1: "kural var" != "kural
  # zorlanıyor" -- without this, `pool.Query`/`.Inner()` bans were prose only.
  forbidigo:
    analyze-types: true
    forbid:
      - p: '^db\.Pool\.Inner$'
        msg: "module code must not call db.Pool.Inner() — it returns the raw pgxpool.Pool and bypasses RLS tenant scoping. Use WithTenantTx/WithTenantReadTx/WithAllTenantsTx (ADR-SEC-001/002)."
      - p: '^pgxpool\.Pool\.(Query|QueryRow|Exec|SendBatch)$'
        msg: "module code must not query the raw pgxpool.Pool directly — it bypasses RLS tenant scoping. Use WithTenantTx/WithTenantReadTx/WithAllTenantsTx (ADR-SEC-001/002)."

  revive:
    rules:
      - name: exported
      - name: error-return
      - name: var-naming
      - name: indent-error-flow

  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - .Wrap(
      - .Wrapf(
      # pgx and Redis interface methods: errors are already contextual at the call site.
      - .Scan(
      - .Err()
      - .Result()
      # Standard library patterns used in HTTP helpers.
      - .Decode(
      - .Write(
      - uuid.Parse(
    ignorePackageGlobs:
      - onlinemenu.tr/internal/platform/*
      # Internal module packages: errors propagate with module-level context from repo/service funcs.
      - onlinemenu.tr/internal/modules/*

  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    # Test files may use testify assertions without wrapping errors.
    - path: _test\.go
      linters:
        - wrapcheck
        - errcheck

    # cmd/ files are composition roots; wrapcheck doesn't add value there.
    - path: cmd/
      linters:
        - wrapcheck

    # Deferred cache deletions intentionally use context.Background() because the
    # request context is already cancelled when the defer runs.
    - path: internal/platform/httpx/idempotency\.go
      linters:
        - contextcheck

    # The outbox dispatcher goroutine must outlive the startup context.
    # context.WithCancel(context.Background()) is intentional — the goroutine
    # runs for the app's full lifetime and is cancelled via OnStop.
    - path: internal/platform/outbox/dispatcher\.go
      linters:
        - contextcheck

    # forbidigo (db.Pool.Inner / raw pgxpool.Pool queries) only applies to module
    # code (internal/modules/**). Platform packages and composition roots are the
    # legitimate implementers of the RLS-tenant-scoping escape hatch itself.
    - path: internal/platform/
      linters:
        - forbidigo
    - path: cmd/
      linters:
        - forbidigo

  # Maximum issues per linter before the run fails.
  max-issues-per-linter: 50
  max-same-issues: 10
