run:
  timeout: 5m
  go: '1.24'

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - goimports
    - revive
    - exhaustive
    - wrapcheck
    - contextcheck
  disable:
    - depguard

linters-settings:
  goimports:
    local-prefixes: onlinemenu.tr

  revive:
    rules:
      - name: exported
      - name: error-return
      - name: var-naming
      - name: indent-error-flow

  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - .Wrap(
      - .Wrapf(
      # pgx and Redis interface methods: errors are already contextual at the call site.
      - .Scan(
      - .Err()
      - .Result()
      # Standard library patterns used in HTTP helpers.
      - .Decode(
      - .Write(
      - uuid.Parse(
    ignorePackageGlobs:
      - onlinemenu.tr/internal/platform/*
      # Internal module packages: errors propagate with module-level context from repo/service funcs.
      - onlinemenu.tr/internal/modules/*

  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    # Test files may use testify assertions without wrapping errors.
    - path: _test\.go
      linters:
        - wrapcheck
        - errcheck

    # cmd/ files are composition roots; wrapcheck doesn't add value there.
    - path: cmd/
      linters:
        - wrapcheck

    # Deferred cache deletions intentionally use context.Background() because the
    # request context is already cancelled when the defer runs.
    - path: internal/platform/httpx/idempotency\.go
      linters:
        - contextcheck

  # Maximum issues per linter before the run fails.
  max-issues-per-linter: 50
  max-same-issues: 10
