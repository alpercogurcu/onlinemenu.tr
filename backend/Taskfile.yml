version: '3'

# .env dosyası varsa (sops:decrypt ile üretilir) task'ların shell komutlarına
# ortam değişkeni olarak enjekte edilir. Dosya yoksa Task sessizce atlar.
dotenv: ['.env']

vars:
  GO_MODULE: onlinemenu.tr

tasks:
  dev:
    desc: "air ile hot-reload API (compose zaten ayakta olmalı)"
    vars:
      # air GOPATH/bin altında kurulu olabilir ama PATH'te olmayabilir;
      # PATH'te varsa onu, yoksa $(go env GOPATH)/bin altındakini kullan.
      AIR_BIN:
        sh: command -v air 2>/dev/null || echo "$(go env GOPATH)/bin/air"
    cmds:
      - "{{.AIR_BIN}} -c .air.toml"

  build:
    desc: "Tüm Go binary'lerini build et (ko ile)"
    cmds:
      - ko build ./cmd/...

  build:local:
    desc: "Lokal Go build (ko olmadan)"
    cmds:
      - go build -o bin/api ./cmd/api
      - go build -o bin/api-core ./cmd/api-core
      - go build -o bin/api-pos ./cmd/api-pos
      - go build -o bin/api-finance ./cmd/api-finance
      - go build -o bin/edge ./cmd/edge
      - go build -o bin/worker ./cmd/worker

  test:
    desc: "Tüm testler (race detector açık)"
    cmds:
      - go test ./... -race -count=1

  test:unit:
    desc: "Sadece unit testler"
    cmds:
      - go test ./... -race -short

  test:integration:
    desc: "testcontainers integration testler"
    cmds:
      - go test ./... -race -run Integration -timeout 10m

  test:rls-leak:
    desc: "RLS sızıntı testleri (SEC-001, SEC-002)"
    cmds:
      - go test ./internal/platform/db/... -run TestRLS -v

  test:coverage:
    desc: "Test coverage raporu"
    cmds:
      - go test ./... -race -coverprofile=coverage.out
      - go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: "golangci-lint + go-arch-lint"
    vars:
      # Bu araçlar $(go env GOPATH)/bin altında kurulu olabilir ama PATH'te
      # olmayabilir; PATH'te varsa onu, yoksa GOPATH/bin altındakini kullan.
      GOLANGCI_LINT_BIN:
        sh: command -v golangci-lint 2>/dev/null || echo "$(go env GOPATH)/bin/golangci-lint"
      GO_ARCH_LINT_BIN:
        sh: command -v go-arch-lint 2>/dev/null || echo "$(go env GOPATH)/bin/go-arch-lint"
    cmds:
      - "{{.GOLANGCI_LINT_BIN}} run"
      - "{{.GO_ARCH_LINT_BIN}} check"
      - ./scripts/lint_sql_rules.sh

  fmt:
    desc: "Go kod formatla"
    vars:
      GOIMPORTS_BIN:
        sh: command -v goimports 2>/dev/null || echo "$(go env GOPATH)/bin/goimports"
    cmds:
      - gofmt -w .
      - "{{.GOIMPORTS_BIN}} -w ."

  vet:
    desc: "go vet"
    cmds:
      - go vet ./...

  security:scan:
    desc: "gosec + trivy güvenlik taraması"
    cmds:
      - gosec -conf .gosec.yml -exclude-generated ./...
      - trivy fs --severity HIGH,CRITICAL .

  gen:
    desc: "Tüm kod üretimi (sqlc, events)"
    deps: [gen:sqlc, gen:events]

  gen:sqlc:
    desc: "sqlc ile DB kodu üret"
    cmds:
      - sqlc generate

  gen:events:
    desc: "Event JSON Schema → Go struct"
    cmds:
      - go run ./cmd/eventgen contracts/events internal/platform/events/generated

  # cmd/migrate yalnızca "pgx5://" şemasını tanır (golang-migrate pgx/v5 driver)
  # ve RLS FORCE nedeniyle tablo sahibi rol (app_migrator) ile çalışmalı.
  # .env içindeki DATABASE_URL ise "postgres://" şemalı ve app_runtime rollüdür
  # (runtime RLS zorunluluğu, bkz. ADR-SEC-002) — migration için kullanılamaz.
  # Bu yüzden migrate task'ları DATABASE_URL yerine OUTBOX_MIGRATOR_DSN'i
  # ("postgres://" → "pgx5://" şema dönüşümüyle) MIGRATE_DSN olarak türetip
  # cmd/migrate'e DATABASE_URL adıyla enjekte eder.
  migrate:up:
    desc: "Tüm modül migration'larını çalıştır (app_migrator rolü + pgx5 şeması)"
    vars:
      MIGRATE_DSN:
        sh: |
          if [ -z "$OUTBOX_MIGRATOR_DSN" ]; then
            echo "HATA: OUTBOX_MIGRATOR_DSN .env icinde tanimli degil (app_migrator rolu gerekir, bkz. ADR-SEC-002)." >&2
            exit 1
          fi
          echo "$OUTBOX_MIGRATOR_DSN" | sed -e 's#^postgres://#pgx5://#' -e 's#^postgresql://#pgx5://#'
    cmds:
      - DATABASE_URL="{{.MIGRATE_DSN}}" go run ./cmd/migrate up

  migrate:down:
    desc: "Son migration'ı geri al (app_migrator rolü + pgx5 şeması)"
    vars:
      MIGRATE_DSN:
        sh: |
          if [ -z "$OUTBOX_MIGRATOR_DSN" ]; then
            echo "HATA: OUTBOX_MIGRATOR_DSN .env icinde tanimli degil (app_migrator rolu gerekir, bkz. ADR-SEC-002)." >&2
            exit 1
          fi
          echo "$OUTBOX_MIGRATOR_DSN" | sed -e 's#^postgres://#pgx5://#' -e 's#^postgresql://#pgx5://#'
    cmds:
      - DATABASE_URL="{{.MIGRATE_DSN}}" go run ./cmd/migrate down 1

  migrate:new:
    desc: "Yeni migration oluştur (task migrate:new MODULE=pos NAME=add_table)"
    vars:
      MIGRATE_CLI_BIN:
        sh: command -v migrate 2>/dev/null || echo "$(go env GOPATH)/bin/migrate"
    cmds:
      - "{{.MIGRATE_CLI_BIN}} create -ext sql -dir migrations/{{.MODULE}} {{.NAME}}"

  migrate:verify:
    desc: "RLS policy sayısını doğrula (app_migrator rolü + pgx5 şeması)"
    vars:
      MIGRATE_DSN:
        sh: |
          if [ -z "$OUTBOX_MIGRATOR_DSN" ]; then
            echo "HATA: OUTBOX_MIGRATOR_DSN .env icinde tanimli degil (app_migrator rolu gerekir, bkz. ADR-SEC-002)." >&2
            exit 1
          fi
          echo "$OUTBOX_MIGRATOR_DSN" | sed -e 's#^postgres://#pgx5://#' -e 's#^postgresql://#pgx5://#'
    cmds:
      - DATABASE_URL="{{.MIGRATE_DSN}}" go run ./cmd/migrate verify

  sops:decrypt:
    desc: ".env.sops → .env (lokal dev için)"
    cmds:
      - sops -d .env.sops > .env

  sops:encrypt:
    desc: ".env → .env.sops"
    cmds:
      - sops -e .env > .env.sops

  ci:
    desc: "CI pipeline lokalde simüle et"
    cmds:
      - task: lint
      - task: vet
      - task: test
      - task: security:scan
      - task: build:local

  clean:
    desc: "Build artifact'larını sil"
    cmds:
      - rm -rf bin/ tmp/ coverage.out coverage.html

  # ---------------------------------------------------------------------------
  # k6 yük testi (Sprint-8, ROADMAP Faz 1: "500 aktif POS simülasyonu")
  # Detay ve bilinen sınırlar: backend/loadtest/README.md
  # ---------------------------------------------------------------------------

  loadtest:precheck:
    desc: "API + Postgres erişilebilir mi kontrol et (loadtest:smoke/full'dan önce)"
    cmds:
      - |
        set -e
        addr="${HTTP_ADDR:-:8081}"
        url="http://localhost${addr}/healthz"
        echo "API kontrol ediliyor: $url"
        for i in $(seq 1 10); do
          if curl -sf "$url" > /dev/null; then
            echo "API ayakta."
            exit 0
          fi
          sleep 2
        done
        echo "HATA: API'ye ulaşılamadı ($url)." >&2
        echo "Önce: task compose:up:core (veya compose:up) + task backend:migrate:up + psql ile dev-seed/loadtest seed + cmd/api (task backend:dev ya da go run ./cmd/api)." >&2
        exit 1

  loadtest:seed:
    desc: "Yük testi kasiyer havuzunu seed'ler (dev-seed.sql + loadtest/seed.sql, app_migrator ile)"
    cmds:
      - docker compose -f ../deploy/docker-compose.dev.yml exec -T postgres psql -U app_migrator -d onlinemenu_dev < deploy/dev-seed.sql
      - docker compose -f ../deploy/docker-compose.dev.yml exec -T postgres psql -U app_migrator -d onlinemenu_dev < loadtest/seed.sql

  loadtest:smoke:
    desc: "k6 smoke profili — 25 VU, 2dk (mixed_load.js: kasiyer akışı + KDS WS)"
    deps: [loadtest:precheck]
    cmds:
      - k6 run -e PROFILE=smoke loadtest/k6/mixed_load.js

  loadtest:full:
    desc: "k6 tam profil — 500 VU'ya ramping-vus, ~17dk (bkz. README: yalnız yeterli donanımda çalıştırın)"
    deps: [loadtest:precheck]
    cmds:
      - k6 run -e PROFILE=full loadtest/k6/mixed_load.js
