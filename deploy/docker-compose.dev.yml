# =============================================================================
# Online Menu — Dev Docker Compose
# Faz 0 altyapısı: core + auth + storage + observability
#
# Profil kullanımı:
#   task compose:up                                    → tüm servisler
#   docker compose -f deploy/docker-compose.dev.yml --profile core up -d
#   docker compose -f deploy/docker-compose.dev.yml --profile auth up -d
#   docker compose -f deploy/docker-compose.dev.yml --profile storage up -d
#   docker compose -f deploy/docker-compose.dev.yml --profile observability up -d
#
# Go API'si bu compose'a dahil değil — `task dev` ile air üzerinden çalıştırılır.
# =============================================================================

name: onlinemenu-dev

networks:
  onlinemenu-dev:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  nats-data:
  vault-data:
  keycloak-data:
  minio-data:
  grafana-data:
  prometheus-data:
  loki-data:
  tempo-data:

# =============================================================================
# CORE SERVICES — profiles: [core]
# Go uygulaması için zorunlu: postgres, redis, nats, vault
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 18 — Ana veritabanı
  # ADR-SEC-001: pgBouncer transaction mode uyumu (SET LOCAL zorunlu)
  # ADR-SEC-002: FORCE RLS + app_migrator / app_runtime rolleri
  # init.sql: pgvector, uuid-ossp, pg_trgm extension'ları + rol oluşturma
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17
    # pgvector image PG18 için henüz stable değil; pg17 ile pgvector destekli başlıyoruz.
    # PG18 stable release'inde pgvector/pgvector:pg18 ile güncellenecek.
    profiles: [core]
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
      POSTGRES_DB: onlinemenu_dev
    ports:
      - "5442:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    networks:
      - onlinemenu-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d onlinemenu_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 8 — Cache + Queue
  # Kullanım: asynq job queue, OPA decision cache, idempotency store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    profiles: [core]
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6389:6379"
    volumes:
      - redis-data:/data
    networks:
      - onlinemenu-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # NATS JetStream 2.12+ — Event messaging
  # JetStream aktif; dev'de single-node
  # ---------------------------------------------------------------------------
  nats:
    image: nats:2.12-alpine
    profiles: [core]
    restart: unless-stopped
    command:
      - "-js"
      - "-sd=/data"
      - "-m=8222"
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring HTTP
    volumes:
      - nats-data:/data
    networks:
      - onlinemenu-dev
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # HashiCorp Vault — Secrets yönetimi
  # Dev mode: memory backend, root token sabit (üretimde asla)
  # Runtime sırlar (DB credentials, NATS token, Keycloak secret) Vault'tan gelir
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.18
    profiles: [core]
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_LOG_LEVEL: warn
    command: server -dev
    ports:
      - "8210:8200"
    volumes:
      - vault-data:/vault/data
    networks:
      - onlinemenu-dev
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://localhost:8200 | grep -q 'Initialized.*true' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

# =============================================================================
# AUTH SERVICES — profiles: [auth]
# Keycloak 26.x — Tek realm, postgres backend
# ADR-AUTH-002: Tek Keycloak realm, tüm tenant'lar aynı realm'de
# =============================================================================

  # ---------------------------------------------------------------------------
  # Keycloak 26.x — Kimlik ve yetkilendirme
  # KC_DB=postgres → keycloak database (init.sql'de oluşturulur)
  # Strict hostname ve HTTPS dev'de devre dışı
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    profiles: [auth]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Admin credentials
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # PostgreSQL backend
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres_dev_password
      # Dev-friendly settings
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: warn
      KC_CACHE: local
    # --import-realm: başlangıçta /opt/keycloak/data/import altındaki realm dosyalarını içe aktarır.
    # realm-onlinemenu.json config-as-code (ADR-AUTH-002): admin-panel + pos-desktop PKCE client'ları,
    # audience/context-claims scope'ları ve DEV-ONLY seed kullanıcı. Detay: deploy/keycloak/README.md
    command: start-dev --import-realm
    ports:
      - "8090:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak:/opt/keycloak/data/import:ro
    networks:
      - onlinemenu-dev
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"status\": \"UP\"' <&3 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

# =============================================================================
# STORAGE SERVICES — profiles: [storage]
# MinIO — S3-compatible nesne depolama
# Bucket'lar: invoices, menu-images, hr-documents
# =============================================================================

  # ---------------------------------------------------------------------------
  # MinIO — Nesne depolama
  # API: 9000, Console: 9001
  # Başlangıç bucket'ları init komutuyla oluşturulur
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles: [storage]
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_VOLUMES: /data
    command: server /data --console-address ":9001"
    ports:
      - "9010:9000"   # S3 API
      - "9011:9001"   # Web console
    volumes:
      - minio-data:/data
    networks:
      - onlinemenu-dev
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || curl -sf http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # MinIO init — Bucket'ları oluşturur (one-shot container)
  # minio/mc kullanarak invoices, menu-images, hr-documents bucket'larını açar
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T13-07-22Z
    profiles: [storage]
    restart: no
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/invoices &&
        mc mb --ignore-existing local/menu-images &&
        mc mb --ignore-existing local/hr-documents &&
        echo 'Buckets ready: invoices, menu-images, hr-documents'
      "
    networks:
      - onlinemenu-dev

# =============================================================================
# OBSERVABILITY SERVICES — profiles: [observability]
# Grafana Stack: Prometheus + Loki + Tempo + Grafana + OTel Collector
# =============================================================================

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics collection + scraping
  # OTel Collector'dan remote_write alır, Grafana datasource
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.3.1
    profiles: [observability]
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - onlinemenu-dev
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Loki — Log aggregation
  # OTel Collector'dan OTLP HTTP alır, Grafana datasource
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.5.0
    profiles: [observability]
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    networks:
      - onlinemenu-dev
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Tempo — Distributed tracing backend
  # OTel Collector'dan OTLP gRPC alır (container-internal 4317), Prometheus'a metrics yazar
  # Host'a yalnızca query API (3200) açık — 4317/4318 host portları otel-collector'a ait
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.7.2
    profiles: [observability]
    restart: unless-stopped
    command: -config.file=/etc/tempo/config.yaml
    ports:
      - "3200:3200"   # HTTP query API (Grafana + direkt erişim)
    expose:
      - "4317"        # OTLP gRPC — yalnızca container ağında (otel-collector'a)
      - "4318"        # OTLP HTTP — yalnızca container ağında
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/tmp/tempo
    networks:
      - onlinemenu-dev
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — Telemetri merkezi
  # Receivers: OTLP gRPC (4317) + HTTP (4318) — Go API buraya gönderir
  # Exporters: Prometheus (metrics), Loki (logs), Tempo (traces)
  # Go API bağlantısı: OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317 (gRPC)
  #                 ya da OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 (HTTP)
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    profiles: [observability]
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC — Go API buraya gönderir
      - "4318:4318"   # OTLP HTTP — Go API buraya gönderir
      - "8888:8888"   # OTel Collector internal metrics (Prometheus scrape)
      - "8889:8889"   # Prometheus exporter endpoint (app metrics)
    volumes:
      - ./otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - onlinemenu-dev
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:13133 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Grafana — Observability dashboard
  # Datasources: Prometheus, Loki, Tempo (provisioning ile otomatik)
  # admin/admin — dev'de şifre değiştirme zorunluluğu devre dışı
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.6.1
    profiles: [observability]
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_HTTP_PORT: "3000"
      GF_FEATURE_TOGGLES_ENABLE: traceToMetrics,metricsSummary,tempoApmTable
      # Dev'de şifre değiştirme ekranını atla
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - onlinemenu-dev
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
